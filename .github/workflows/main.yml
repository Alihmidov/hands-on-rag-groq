name: RAG BOT CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync
      
      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env
        
      - name: Run tests
        env:
          PYTHONPATH: .
        run: uv run pytest tests/ 